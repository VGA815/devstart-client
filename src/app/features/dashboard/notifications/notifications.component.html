<div class="page">

  <header class="page__heading page__heading-row">
    <h1 class="page__title page__title--sm">Уведомления</h1>
    @if (hasUnread()) {
      <button class="btn btn--ghost btn--sm"
        [disabled]="saving()"
        (click)="markAllRead()">
        {{ saving() ? 'Отмечаем…' : 'Прочитать все' }}
      </button>
    }
  </header>

  @if (loading()) {
    <div class="card card__body--flush">
      <app-skeleton height="60px" />
      <app-skeleton height="60px" />
      <app-skeleton height="60px" />
    </div>

  } @else if (notifications().length === 0) {
    <div class="empty-state empty-state--card">
      <p class="empty-state__title">Уведомлений нет</p>
    </div>

  } @else {
    <div class="card card__body--flush">
      @for (n of notifications(); track n.id) {
        <div
          class="notif-item"
          [class.notif-item--unread]="!n.isRead"
          (click)="markRead(n)">
          <span class="notif-item__indicator" [class.notif-item__indicator--unread]="!n.isRead"></span>

          <div class="notif-item__body">
            <p class="notif-item__title">{{ n.title }}</p>
            <p class="notif-item__sub">{{ n.body }}</p>
            <span class="notif-item__time">{{ formatDate(n.createdAt) }}</span>
          </div>
        </div>
      }
    </div>
  }

</div>
