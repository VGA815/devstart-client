<div class="av-upload">

  <div class="av-upload__trigger" (click)="openFilePicker()" [class.av-upload__trigger--loading]="uploading()">
    @if (displayUrl()) {
      <img class="av-upload__img" [src]="displayUrl()!" (error)="onImgError()" alt="avatar" />
    } @else {
      <span class="av-upload__initials">{{ initials() }}</span>
    }

    <div class="av-upload__overlay">
      @if (uploading()) {
        <span class="av-upload__spinner"></span>
      } @else {
        <svg class="av-upload__cam" viewBox="0 0 20 20" fill="none" xmlns="http://www.w3.org/2000/svg">
          <path d="M7.5 3.5L6.5 5.5H3.5C2.95 5.5 2.5 5.95 2.5 6.5V15.5C2.5 16.05 2.95 16.5 3.5 16.5H16.5C17.05 16.5 17.5 16.05 17.5 15.5V6.5C17.5 5.95 17.05 5.5 16.5 5.5H13.5L12.5 3.5H7.5Z" stroke="white" stroke-width="1.25" stroke-linejoin="round"/>
          <circle cx="10" cy="11" r="2.5" stroke="white" stroke-width="1.25"/>
        </svg>
      }
    </div>
  </div>

  <input #fileInput type="file" accept="image/jpeg,image/png,image/webp,image/gif"
    style="display:none" (change)="onFileSelected($event)" />

  <div class="av-upload__meta">
    <button type="button" class="av-upload__btn" (click)="openFilePicker()" [disabled]="uploading()">
      {{ uploading() ? 'Загрузка…' : (currentImageId() ? 'Изменить' : 'Загрузить фото') }}
    </button>
    @if (currentImageId() && !uploading()) {
      <button type="button" class="av-upload__btn av-upload__btn--danger" (click)="remove()">
        Удалить
      </button>
    }
    <span class="av-upload__hint">JPEG, PNG, WebP · до 5 МБ</span>
    @if (uploadError()) {
      <span class="av-upload__error">{{ uploadError() }}</span>
    }
  </div>

</div>
