server {
    listen 80;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;

    # Don't advertise the nginx version.
    server_tokens off;

    # Reject hidden/dotfiles (.git, .env, ...) but keep ACME challenges working.
    location ~ /\.(?!well-known) {
        deny all;
    }

    # Fingerprinted build artifacts (outputHashing: all) — cache hard.
    location ~* \.(?:js|css|woff2?|ttf|otf|svg|png|jpg|jpeg|gif|ico|webp)$ {
        expires 1y;
        access_log off;
        add_header Cache-Control "public, immutable" always;
        add_header X-Content-Type-Options "nosniff" always;
        try_files $uri =404;
    }

    # App shell + SPA client-side routing.
    # NOTE: nginx does not inherit add_header into a location that sets its own,
    # so the security headers are declared here explicitly (this is the HTML doc).
    location / {
        try_files $uri $uri/ /index.html;

        # The shell must not be cached, or clients pin a stale bundle after deploy.
        add_header Cache-Control "no-cache" always;

        add_header X-Content-Type-Options "nosniff" always;
        add_header X-Frame-Options "SAMEORIGIN" always;
        add_header Referrer-Policy "strict-origin-when-cross-origin" always;
        add_header Permissions-Policy "geolocation=(), microphone=(), camera=()" always;

        # Content-Security-Policy is opt-in (commented) to avoid white-screening on a
        # too-strict directive. Single origin keeps it simple: the API and WebSocket are
        # same-origin, so connect-src 'self' is enough — no external hosts to enumerate.
        # add_header Content-Security-Policy "default-src 'self'; script-src 'self'; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com; font-src 'self' https://fonts.gstatic.com data:; img-src 'self' data: https:; connect-src 'self'; base-uri 'self'; frame-ancestors 'self'; object-src 'none'" always;
    }

    gzip on;
    gzip_min_length 1024;
    gzip_types text/css application/javascript application/json image/svg+xml;
}
